<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Cultivo Vivo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a0e;
    --bg2: #162014;
    --card: #1c2b19;
    --card-hover: #243322;
    --border: #2e4a28;
    --fg: #e8f0e4;
    --muted: #8fa888;
    --accent: #4ade80;
    --accent2: #f59e0b;
    --soil: #5c3d1e;
    --soil-light: #8b6340;
    --danger: #ef4444;
    --info: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
  .bg-scene {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(74,222,128,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(245,158,11,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(28,43,25,0.8) 0%, var(--bg) 100%);
  }
  .leaf-particle {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 0 50% 50% 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: leafFall linear infinite;
  }
  @keyframes leafFall {
    0% { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.5); }
    10% { opacity: 0.3; }
    90% { opacity: 0.15; }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.2); }
  }
  .glass {
    background: rgba(28,43,25,0.7);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
  }
  .card-plant {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card-plant::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .card-plant:hover::before { transform: scaleX(1); }
  .card-plant:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(74,222,128,0.1);
  }
  .card-plant.custom::before {
    background: linear-gradient(90deg, var(--accent2), #fb923c);
  }
  .card-plant.custom:hover {
    border-color: var(--accent2);
    box-shadow: 0 12px 40px rgba(245,158,11,0.1);
  }
  .month-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--fg); }
  .month-btn.active {
    background: linear-gradient(135deg, rgba(74,222,128,0.2), rgba(245,158,11,0.15));
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(74,222,128,0.15);
  }
  .month-btn.current { position: relative; }
  .month-btn.current::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-green { background: rgba(74,222,128,0.15); color: #4ade80; }
  .badge-amber { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-blue { background: rgba(56,189,248,0.15); color: #38bdf8; }
  .badge-red { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-soil { background: rgba(139,99,64,0.2); color: #c9956a; }
  .badge-custom { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
  }
  .fertilizer-bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .fertilizer-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: none; align-items: flex-start; justify-content: center;
    padding: 30px 20px;
    overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 600px; width: 100%;
    margin: auto 0;
    padding: 32px;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
  }
  .loader {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 600; font-size: 0.9rem;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--fg); }
  .filter-btn.active {
    background: rgba(74,222,128,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Formulário */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.1);
  }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--card); color: var(--fg); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

  /* Checkbox de meses */
  .mes-checks {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .mes-check {
    display: flex; align-items: center; justify-content: center;
    padding: 7px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .mes-check:hover { border-color: var(--accent); color: var(--fg); }
  .mes-check.selected {
    background: rgba(74,222,128,0.18);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* NPK sliders */
  .npk-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    outline: none;
  }
  .npk-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .npk-slider.n-slider::-webkit-slider-thumb { background: var(--info); }
  .npk-slider.p-slider::-webkit-slider-thumb { background: var(--accent2); }
  .npk-slider.k-slider::-webkit-slider-thumb { background: var(--accent); }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,222,128,0.3); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--fg); }
  .btn-danger {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.1);
    color: var(--danger);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); border-color: var(--danger); }

  .fab {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), #f97316);
    color: #000;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 8px 30px rgba(245,158,11,0.4);
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 40px rgba(245,158,11,0.5); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  @media (max-width: 768px) {
    .month-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .month-scroll::-webkit-scrollbar { display: none; }
    .fab { bottom: 20px; right: 20px; width: 54px; height: 54px; font-size: 1.3rem; border-radius: 16px; }
  }
</style>
</head>
<body>

<div class="bg-scene"></div>
<div id="leafContainer"></div>
<div id="toast" class="toast glass" style="border-color: var(--accent);"></div>

<!-- Modal de detalhe da planta -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modalBody"></div>
</div>

<!-- Modal de adicionar planta -->
<div id="addModal" class="modal-overlay" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-content" style="max-width:640px;">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold" style="color:var(--fg);">
        <i class="fa-solid fa-plus-circle mr-2" style="color:var(--accent2);"></i>
        Adicionar Hortalia
      </h2>
      <button onclick="closeAddModal()" class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:var(--card);border:1px solid var(--border);">
        <i class="fa-solid fa-xmark" style="color:var(--muted);"></i>
      </button>
    </div>

    <form id="addForm" onsubmit="return salvarPlanta(event)">
      <!-- Nome -->
      <div class="form-group">
        <label class="form-label">Nome da hortalica</label>
        <input class="form-input" id="fNome" required placeholder="Ex: Catalonha">
      </div>

      <div class="form-row">
        <!-- Categoria -->
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="fCategoria" required>
            <option value="folhosas">Folhosas</option>
            <option value="frutos">Frutos</option>
            <option value="raizes">Raizes</option>
            <option value="leguminosas">Leguminosas</option>
            <option value="condimentos">Condimentos</option>
            <option value="gramineas">Gramineas</option>
          </select>
        </div>
        <!-- Ciclo -->
        <div class="form-group">
          <label class="form-label">Ciclo (dias)</label>
          <input class="form-input" id="fDias" type="number" min="10" max="365" required placeholder="Ex: 60">
        </div>
      </div>

      <div class="form-row">
        <!-- Sol -->
        <div class="form-group">
          <label class="form-label">Luz solar</label>
          <select class="form-select" id="fSol" required>
            <option value="sol pleno">Sol pleno</option>
            <option value="meia-sombra">Meia-sombra</option>
          </select>
        </div>
        <!-- Agua -->
        <div class="form-group">
          <label class="form-label">Necessidade de agua</label>
          <select class="form-select" id="fAgua" required>
            <option value="alto">Alta</option>
            <option value="moderado">Moderada</option>
            <option value="baixo">Baixa</option>
          </select>
        </div>
      </div>

      <!-- Meses de plantio -->
      <div class="form-group">
        <label class="form-label">Meses de plantio (toque para selecionar)</label>
        <div class="mes-checks" id="fMeses"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Espacamento</label>
          <input class="form-input" id="fEspacamento" placeholder="Ex: 30x30 cm">
        </div>
        <div class="form-group">
          <label class="form-label">Profundidade da semente</label>
          <input class="form-input" id="fProfundidade" placeholder="Ex: 1 cm">
        </div>
      </div>

      <!-- NPK -->
      <div class="form-group">
        <label class="form-label">NPK Recomendado (arraste os controles)</label>
        <div class="space-y-3">
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold w-6" style="color:var(--info);">N</span>
            <input type="range" class="npk-slider n-slider" id="fN" min="0" max="30" value="10" oninput="document.getElementById('fNVal').textContent=this.value">
            <span class="text-sm font-bold w-8 text-right" id="fNVal" style="color:var(--info);">10</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold w-6" style="color:var(--accent2);">P</span>
            <input type="range" class="npk-slider p-slider" id="fP" min="0" max="30" value="10" oninput="document.getElementById('fPVal').textContent=this.value">
            <span class="text-sm font-bold w-8 text-right" id="fPVal" style="color:var(--accent2);">10</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold w-6" style="color:var(--accent);">K</span>
            <input type="range" class="npk-slider k-slider" id="fK" min="0" max="30" value="10" oninput="document.getElementById('fKVal').textContent=this.value">
            <span class="text-sm font-bold w-8 text-right" id="fKVal" style="color:var(--accent);">10</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Adubo quimico</label>
        <input class="form-input" id="fAduboQuimico" placeholder="Ex: NPK 10-10-10 + farinha de ossos">
      </div>
      <div class="form-group">
        <label class="form-label">Adubo organico</label>
        <input class="form-input" id="fAduboOrganico" placeholder="Ex: Humus de minhoca (2kg/m2)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Adubacao em cobertura</label>
          <input class="form-input" id="fCobertura" placeholder="Ex: Biofertilizante a cada 20 dias">
        </div>
        <div class="form-group">
          <label class="form-label">Frequencia da adubacao</label>
          <input class="form-input" id="fFrequencia" placeholder="Ex: A cada 20 dias">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Dica de cultivo</label>
        <textarea class="form-textarea" id="fDica" placeholder="Ex: Colha as folhas externas primeiro..."></textarea>
      </div>

      <div class="flex gap-3 justify-end mt-6">
        <button type="button" class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
        <button type="submit" class="btn-primary"><i class="fa-solid fa-check"></i> Salvar Hortalica</button>
      </div>
    </form>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="Adicionar hortalica" aria-label="Adicionar hortalica">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- Conteudo principal -->
<div class="relative z-10">
  <header class="glass sticky top-0 z-50" style="border-top:none;border-left:none;border-right:none;">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),#22c55e);">
          <i class="fa-solid fa-seedling text-black text-lg"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold leading-tight" style="color:var(--fg);">Cultivo Vivo</h1>
          <p class="text-xs" style="color:var(--muted);">Calendario inteligente de hortalicas</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <div class="pulse-dot"></div>
          <span class="text-xs font-semibold hidden sm:inline" style="color:var(--accent);" id="liveStatus">Obtendo localizacao...</span>
        </div>
        <button onclick="refreshData()" class="w-9 h-9 rounded-xl flex items-center justify-center transition-all hover:scale-110" style="background:var(--card);border:1px solid var(--border);" title="Atualizar dados">
          <i class="fa-solid fa-arrows-rotate text-sm" style="color:var(--muted);"></i>
        </button>
      </div>
    </div>
  </header>

  <div id="loader" class="flex flex-col items-center justify-center py-32 gap-4">
    <div class="loader"></div>
    <p class="text-sm" style="color:var(--muted);">Detectando sua localizacao e clima...</p>
  </div>

  <main id="mainContent" class="max-w-7xl mx-auto px-4 pb-24" style="display:none;">
    <section class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3" id="weatherPanel"></section>
    <section class="mt-6 glass rounded-2xl p-5 flex flex-wrap items-center gap-4" id="zoneInfo"></section>

    <section class="mt-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold" style="color:var(--fg);">
          <i class="fa-regular fa-calendar-days mr-2" style="color:var(--accent);"></i>
          Calendario de Plantio
        </h2>
        <span class="text-xs font-semibold px-3 py-1 rounded-lg" style="background:rgba(245,158,11,0.15);color:var(--accent2);" id="plantCount"></span>
      </div>
      <div class="month-scroll flex gap-2 pb-2" id="monthSelector"></div>
    </section>

    <section class="mt-5 flex flex-wrap gap-2" id="filterBar"></section>
    <section class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="plantGrid"></section>

    <div id="emptyState" class="hidden text-center py-20">
      <i class="fa-solid fa-leaf text-4xl mb-4" style="color:var(--border);"></i>
      <p class="text-lg font-semibold" style="color:var(--muted);">Nenhuma hortalica encontrada</p>
      <p class="text-sm mt-1" style="color:var(--border);">Tente outro mes, filtro ou adicione uma nova</p>
      <button onclick="openAddModal()" class="btn-primary mt-4"><i class="fa-solid fa-plus"></i> Adicionar Hortalica</button>
    </div>

    <section class="mt-12 glass rounded-2xl p-6" id="monthTips"></section>
  </main>
</div>

<script>
// ==========================================

  clima:{temp:0,umidade:0,vento:0,descricao:'',icon:''},
  cidade:'',
  selectedMeses: []
};

// ==========================================
// LOCALSTORAGE
// ==========================================
function loadCustom() {
  try {
    const data = localStorage.getItem('cultivoVivo_custom');
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}
function saveCustom(list) {
  try { localStorage.setItem('cultivoVivo_custom', JSON.stringify(list)); } catch(e) {}
}
function buildList() {
  const custom = loadCustom();
  HORTALICAS = [...HORTALICAS_BASE.map(h => ({...h, _custom:false})), ...custom.map(h => ({...h, _custom:true}))];
}

// ==========================================
// PARTÍCULAS
// ==========================================
(function createLeaves(){
  const c = document.getElementById('leafContainer');
  for(let i=0;i<12;i++){

    l.className='leaf-particle';
    l.style.left=Math.random()*100+'%';

// ==========================================
// TOAST
// ==========================================
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=type==='error'?'var(--danger)':'var(--accent)';
  t.style.color=type==='error'?'var(--danger)':'var(--accent)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ==========================================
// ZONA CLIMÁTICA
// ==========================================
function determinarZona(lat){
  const a=Math.abs(lat);
  if(a<15)return'ZT'; if(a<23.5)return'ZS'; if(a<35)return'ZTM'; return'ZTF';
}
function zonaLabel(z){return{ZT:'Tropical',ZS:'Subtropical',ZTM:'Temperado Quente',ZTF:'Temperado Frio'}[z]||z;}
function zonaIcon(z){return{ZT:'fa-sun',ZS:'fa-cloud-sun',ZTM:'fa-cloud',ZTF:'fa-snowflake'}[z]||'fa-question';}

// ==========================================
// CLIMA (Open-Meteo)
// ==========================================
async function fetchClima(lat,lon){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto`);
    const d=await r.json(); const c=d.current;
    state.clima={temp:c.temperature_2m,umidity:c.relative_humidity_2m,vento:c.wind_speed_10m,descricao:traduzirTempo(c.weather_code),icon:iconeTempo(c.weather_code)};
  }catch(e){state.clima={temp:'--',umidade:'--',vento:'--',descricao:'Indisponivel',icon:'fa-question'};}
}
function traduzirTempo(c){const m={0:'Ceu limpo',1:'Predominantemente limpo',2:'Parcialmente nublado',3:'Nublado',45:'Nevoeiro',48:'Nevoeiro com geada',51:'Chuvisco leve',53:'Chuvisco moderado',55:'Chuvisco intenso',61:'Chuva leve',63:'Chuva moderada',65:'Chuva forte',71:'Neve leve',73:'Neve moderada',75:'Neve forte',80:'Pancadas leves',81:'Pancadas moderadas',82:'Pancadas fortes',95:'Tempestade',96:'Tempestade com granizo',99:'Tempestade severa'};return m[c]||'Indisponivel';}
function iconeTempo(c){if(c===0)return'fa-sun';if(c<=2)return'fa-cloud-sun';if(c===3)return'fa-cloud';if(c<=48)return'fa-smog';if(c<=55)return'fa-cloud-rain';if(c<=65)return'fa-cloud-showers-heavy';if(c<=75)return'fa-snowflake';if(c<=82)return'fa-cloud-showers-water';return'fa-bolt';}

// ==========================================
// GEOCODIFICAÇÃO
// ==========================================
async function fetchCidade(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pt-BR`);
    const d=await r.json(); const a=d.address;
    state.cidade=a.city||a.town||a.village||a.municipality||a.county||'Local desconhecido';
  }catch(e){state.cidade='Local desconhecido';}
}

function getPlantasDoMes(mes){
  return HORTALICAS.filter(h=>{

  }).filter(h=>state.filtro==='todas'||h.categoria===state.filtro);

function removerPlanta(nome){
  const custom=loadCustom().filter(h=>h.nome!==nome);
  saveCustom(custom);
  buildList();
  closeModal();
  renderPlantas();

// ==========================================
// MODAL DE ADICIONAR
// ==========================================
function openAddModal(){
  state.selectedMeses=[];
  // Resetar formulário
  document.getElementById('addForm').reset();
  document.getElementById('fN').value=10;
  document.getElementById('fP').value=10;
  document.getElementById('fK').value=10;
  document.getElementById('fNVal').textContent='10';
  document.getElementById('fPVal').textContent='10';
  document.getElementById('fKVal').textContent='10';
  // Renderizar checkboxes de mês
  const mc=document.getElementById('fMeses');
  mc.innerHTML=MESES.map((m,i)=>`<div class="mes-check" data-mes="${i}" onclick="toggleMes(this,${i})">${m}</div>`).join('');
  document.getElementById('addModal').classList.add('show');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('show');}

function toggleMes(el, idx){
  if(state.selectedMeses.includes(idx)){
    state.selectedMeses=state.selectedMeses.filter(m=>m!==idx);
    el.classList.remove('selected');
  }else{
    state.selectedMeses.push(idx);
    el.classList.add('selected');
  }
}

function salvarPlanta(e){
  e.preventDefault();
  const nome=document.getElementById('fNome').value.trim();
  if(!nome){showToast('Informe o nome da hortalica.','error');return false;}
  if(!state.selectedMeses.length){showToast('Selecione pelo menos 1 mes de plantio.','error');return false;}

  const cat=document.getElementById('fCategoria').value;
  const nova={
    nome,
    icon: ICONES_CAT[cat]||'fa-seedling',
    cor: CORES_CAT[cat]||'#4ade80',
    categoria: cat,
    zonas: {},
    dias: parseInt(document.getElementById('fDias').value)||60,
    sol: document.getElementById('fSol').value,
    agua: document.getElementById('fAgua').value,
    adubo: {
      tipo: document.getElementById('fAduboQuimico').value.trim()||'NPK personalizado',
      npk: {
        n: parseInt(document.getElementById('fN').value)||0,
        p: parseInt(document.getElementById('fP').value)||0,
        k: parseInt(document.getElementById('fK').value)||0
      },
      organico: document.getElementById('fAduboOrganico').value.trim()||'Nao informado',
      cobertura: document.getElementById('fCobertura').value.trim()||'Nao informado',
      frequencia: document.getElementById('fFrequencia').value.trim()||'Nao informado'
    },
    dica: document.getElementById('fDica').value.trim()||'Hortalica adicionada por voce. Ajuste as recomendacoes conforme sua experiencia.',
    espacamento: document.getElementById('fEspacamento').value.trim()||'--',
    profundidade: document.getElementById('fProfundidade').value.trim()||'--'
  };

  // Atribuir meses a todas as zonas
  ['ZT','ZS','ZTM','ZTF'].forEach(z=>{nova.zonas[z]=[...state.selectedMeses];});

  // Salvar
  const custom=loadCustom();
  // Verificar duplicata
  if(custom.some(h=>h.nome.toLowerCase()===nome.toLowerCase())||HORTALICAS_BASE.some(h=>h.nome.toLowerCase()===nome.toLowerCase())){
    showToast(`"${nome}" ja existe no calendario.`,'error');
    return false;
  }
  custom.push(nova);
  saveCustom(custom);
  buildList();

  closeAddModal();
  renderPlantas();
  renderZone();
  renderTips();
  showToast(`"${nome}" adicionada ao calendario!`);
  return false;
}

      <div>
        <h4 class="text-sm font-bold mb-3" style="color:var(--accent);">Tarefas do mes</h4>
        <ul class="space-y-2">${dicas.map(d=>`<li class="flex items-start gap-2 text-sm" style="color:var(--muted);"><i class="fa-solid fa-check-circle mt-0.5 flex-shrink-0" style="color:var(--accent);"></i>${d}</li>`).join('')}</ul>
      </div>
      <div>
        <h4 class="text-sm font-bold mb-3" style="color:var(--accent2);">Colheita rapida (ate 40 dias)</h4>
        ${rapidas.length?`<div class="flex flex-wrap gap-2">${rapidas.map(r=>`<span class="badge badge-green text-sm py-2 px-4"><i class="fa-solid ${r.icon}" style="color:${r.cor};"></i>${r.nome} · ${r.dias}d</span>`).join('')}</div>`:`<p class="text-sm" style="color:var(--muted);">Nenhuma colheita rapida este mes.</p>`}
        <div class="mt-4 p-3 rounded-lg" style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);">
          <p class="text-xs" style="color:var(--accent2);"><i class="fa-solid fa-info-circle mr-1"></i>${plantasMes.length>=8?'Otimo mes para diversificar!':plantasMes.length>=4?'Mes com boas opcoes. Foque nas recomendadas.':'Mes com poucas opcoes. Aproveite para preparar canteiros.'}</p>
        </div>
      </div>
    </div>`;
}

// ==========================================
// INICIALIZAÇÃO
// ==========================================
async function init(){
  buildList();
  if(!navigator.geolocation){fallbackLocation();return;}
  navigator.geolocation.getCurrentPosition(
    async pos=>{state.lat=pos.coords.latitude;state.lon=pos.coords.longitude;await loadData();},
    ()=>{fallbackLocation();},
    {enableHighAccuracy:false,timeout:10000}
  );
}
function fallbackLocation(){
  state.lat=-23.55;state.lon=-46.63;state.cidade='Sao Paulo (localizacao padrao)';
  loadData().then(()=>showToast('Geolocalizacao negada. Usando localizacao padrao.','error'));
}
async function loadData(){
  state.zona=determinarZona(state.lat);
  await Promise.all([fetchClima(state.lat,state.lon),fetchCidade(state.lat,state.lon)]);
  document.getElementById('loader').style.display='none';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('liveStatus').textContent=`${state.cidade} · Ao vivo`;
  renderWeather();renderZone();renderMeses();renderFiltros();renderPlantas();renderTips();
}
async function refreshData(){
  showToast('Atualizando dados climaticos...');
  await fetchClima(state.lat,state.lon);
  renderWeather();renderZone();
  showToast('Dados atualizados!');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeAddModal();}});
init();
</script>
</body>
</html>
