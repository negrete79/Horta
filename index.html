<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Cultivo Vivo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a0e;
    --bg2: #162014;
    --card: #1c2b19;
    --card-hover: #243322;
    --border: #2e4a28;
    --fg: #e8f0e4;
    --muted: #8fa888;
    --accent: #4ade80;
    --accent2: #f59e0b;
    --soil: #5c3d1e;
    --soil-light: #8b6340;
    --danger: #ef4444;
    --info: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

  /* Fundo animado com partículas de folhas */
  .bg-scene {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(74,222,128,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(245,158,11,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(28,43,25,0.8) 0%, var(--bg) 100%);
  }
  .leaf-particle {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 0 50% 50% 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: leafFall linear infinite;
  }
  @keyframes leafFall {
    0% { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.5); }
    10% { opacity: 0.3; }
    90% { opacity: 0.15; }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.2); }
  }

  .glass {
    background: rgba(28,43,25,0.7);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
  }
  .card-plant {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card-plant::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }
  .card-plant:hover::before { transform: scaleX(1); }
  .card-plant:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(74,222,128,0.1);
  }

  .month-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--fg); }
  .month-btn.active {
    background: linear-gradient(135deg, rgba(74,222,128,0.2), rgba(245,158,11,0.15));
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(74,222,128,0.15);
  }
  .month-btn.current {
    position: relative;
  }
  .month-btn.current::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-green { background: rgba(74,222,128,0.15); color: #4ade80; }
  .badge-amber { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-blue { background: rgba(56,189,248,0.15); color: #38bdf8; }
  .badge-red { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-soil { background: rgba(139,99,64,0.2); color: #c9956a; }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
  }

  .fertilizer-bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .fertilizer-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 560px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 32px;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
  }

  .loader {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 600; font-size: 0.9rem;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--fg); }
  .filter-btn.active {
    background: rgba(74,222,128,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 768px) {
    .month-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .month-scroll::-webkit-scrollbar { display: none; }
  }
</style>
</head>
<body>

<div class="bg-scene"></div>

<!-- Partículas de folhas -->
<div id="leafContainer"></div>

<!-- Toast -->
<div id="toast" class="toast glass" style="border-color: var(--accent);"></div>

<!-- Modal de detalhe -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modalBody"></div>
</div>

<!-- Conteúdo principal -->
<div class="relative z-10">

  <!-- Cabeçalho -->
  <header class="glass sticky top-0 z-50" style="border-top:none;border-left:none;border-right:none;">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),#22c55e);">
          <i class="fa-solid fa-seedling text-black text-lg"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold leading-tight" style="color:var(--fg);">Cultivo Vivo</h1>
          <p class="text-xs" style="color:var(--muted);">Calendário inteligente de hortaliças</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <div class="pulse-dot"></div>
          <span class="text-xs font-semibold" style="color:var(--accent);" id="liveStatus">Obtendo localização...</span>
        </div>
        <button onclick="refreshData()" class="w-9 h-9 rounded-xl flex items-center justify-center transition-all hover:scale-110" style="background:var(--card);border:1px solid var(--border);" title="Atualizar dados">
          <i class="fa-solid fa-arrows-rotate text-sm" style="color:var(--muted);"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Loader -->
  <div id="loader" class="flex flex-col items-center justify-center py-32 gap-4">
    <div class="loader"></div>
    <p class="text-sm" style="color:var(--muted);">Detectando sua localização e clima...</p>
  </div>

  <!-- Conteúdo -->
  <main id="mainContent" class="max-w-7xl mx-auto px-4 pb-20" style="display:none;">

    <!-- Painel climático -->
    <section class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3" id="weatherPanel"></section>

    <!-- Info de zona -->
    <section class="mt-6 glass rounded-2xl p-5 flex flex-wrap items-center gap-4" id="zoneInfo"></section>

    <!-- Seletor de mês -->
    <section class="mt-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold" style="color:var(--fg);">
          <i class="fa-regular fa-calendar-days mr-2" style="color:var(--accent);"></i>
          Calendário de Plantio
        </h2>
        <span class="text-xs font-semibold px-3 py-1 rounded-lg" style="background:rgba(245,158,11,0.15);color:var(--accent2);" id="plantCount"></span>
      </div>
      <div class="month-scroll flex gap-2 pb-2" id="monthSelector"></div>
    </section>

    <!-- Filtros -->
    <section class="mt-5 flex flex-wrap gap-2" id="filterBar"></section>

    <!-- Grade de hortaliças -->
    <section class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="plantGrid"></section>

    <!-- Vazio -->
    <div id="emptyState" class="hidden text-center py-20">
      <i class="fa-solid fa-leaf text-4xl mb-4" style="color:var(--border);"></i>
      <p class="text-lg font-semibold" style="color:var(--muted);">Nenhuma hortaliça encontrada</p>
      <p class="text-sm mt-1" style="color:var(--border);">Tente outro mês ou filtro</p>
    </div>

    <!-- Dicas do mês -->
    <section class="mt-12 glass rounded-2xl p-6" id="monthTips"></section>

  </main>
</div>
